<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダッシュボード | MeguRee</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f3ee;--surface:#fff;--border:#e2d9ce;
  --orange:#e8630a;--orange-light:#f97316;--orange-pale:#fff4ec;
  --green:#1e6641;--green-pale:#e8f5ee;
  --yellow:#d97706;--yellow-pale:#fffbeb;
  --text:#1a1208;--text-muted:#7a6a55;
  --sidebar-bg:#1a1208;--sidebar-text:#e8d5bc;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:240px;min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo img{width:140px;margin-bottom:4px;display:block}
.sidebar-logo-sub{font-size:10px;color:rgba(232,213,188,0.4);letter-spacing:2px;}
.sidebar-nav{padding:16px 12px;flex:1}
.nav-label{font-size:10px;color:rgba(232,213,188,0.3);letter-spacing:2px;padding:0 12px;margin-bottom:8px;margin-top:16px}
.nav-label:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--sidebar-text);font-size:14px;font-weight:500;transition:all 0.2s;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.06)}
.nav-item.active{background:var(--orange);color:#fff}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left{}
.page-title{font-size:22px;font-weight:700;letter-spacing:-0.3px}
.page-sub{font-size:14px;color:var(--text-muted);margin-top:2px}
.period-select{display:flex;align-items:center;gap:8px}
.period-select label{font-size:14px;color:var(--text-muted);font-weight:500}
.period-select select{padding:7px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Noto Sans JP',sans-serif;background:var(--surface);color:var(--text);cursor:pointer;outline:none;transition:border-color 0.2s}
.period-select select:focus{border-color:var(--orange)}
.content{padding:28px 32px;flex:1}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.kpi-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:18px 20px}
.kpi-label{font-size:13px;color:var(--text-muted);font-weight:600;margin-bottom:10px;letter-spacing:0.3px}
.kpi-value{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;color:var(--text);line-height:1.05;letter-spacing:-0.5px}
.kpi-value.warn{color:var(--orange)}
.kpi-sub{font-size:13px;color:var(--text-muted);margin-top:8px}
.kpi-sub.up{color:var(--green);font-weight:600}
.kpi-sub.down{color:#dc2626;font-weight:600}
.section-col{display:flex;flex-direction:column;gap:20px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--border)}
.card-title{font-size:14px;font-weight:700}
.card-body{padding:20px}
.chart-container{height:200px;position:relative;border-bottom:1px solid var(--border)}
.plan-lock{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(247,243,238,0.92);backdrop-filter:blur(3px);z-index:10;text-align:center;padding:16px}
.plan-lock-icon{font-size:28px;line-height:1}
.plan-lock-title{font-size:14px;font-weight:700;color:var(--text)}
.plan-lock-sub{font-size:14px;color:var(--text-muted);line-height:1.5}
.plan-lock-btn{padding:7px 16px;background:var(--orange);color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:opacity 0.2s}
.plan-lock-btn:hover{opacity:0.85}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg);border-bottom:1px solid var(--border)}
th{padding:10px 16px;text-align:left;font-size:14px;font-weight:700;color:var(--text-muted);letter-spacing:1px;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
td{padding:13px 16px;font-size:14px;vertical-align:middle}
/* 画面幅が狭い時（ノートPC100%表示など）は表の左右余白を詰め、収まらない分はカード内スクロールに逃がす（ページ全体の横スクロールを出さない） */
@media (max-width:1599px){
  th,td{padding-left:8px;padding-right:8px}
  .main,.content{min-width:0} /* flex縦割りのmainが中身の最小幅より縮めずページ全体がはみ出すのを防ぐ */
  .kpi-grid>*,.charts-row>*,.todo-bar>*{min-width:0} /* グリッド子も同様 */
  .card{overflow-x:auto}
}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:13px;font-weight:600}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge-new{background:var(--orange-pale);color:var(--orange)}
.badge-processing{background:var(--yellow-pale);color:var(--yellow)}
.badge-shipped{background:var(--green-pale);color:var(--green)}
.status-sel{border-radius:20px;font-size:14px;font-weight:600;padding:3px 8px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;outline:none;-webkit-appearance:none;appearance:none;transition:box-shadow 0.2s}
.status-sel.s-new{background:var(--orange-pale);color:var(--orange);border:1px solid rgba(232,99,10,0.2)}
.status-sel.s-processing{background:var(--yellow-pale);color:var(--yellow);border:1px solid rgba(217,119,6,0.2)}
.status-sel.s-shipped{background:var(--green-pale);color:var(--green);border:1px solid rgba(30,102,65,0.2)}
.status-sel.saved{box-shadow:0 0 0 2px var(--green)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif;text-decoration:none}
.btn:hover{opacity:0.85}
.btn-primary{background:var(--orange);color:#fff}
.btn-sm{padding:5px 12px;font-size:14px;border-radius:8px}
.btn-quiet{color:var(--text-muted);font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap}
.btn-quiet:hover{color:var(--orange)}

.sidebar-footer{padding:12px 12px 16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:auto}
.logout-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(232,213,188,0.5);font-size:14px;font-weight:500;transition:all 0.2s;text-decoration:none}
.logout-item:hover{background:rgba(255,69,0,0.15);color:#ff9a7a}
.topbar-user{display:flex;align-items:center;gap:10px}
.topbar-user-name{font-size:14px;font-weight:600;color:var(--text)}
.topbar-user-role{font-size:14px;color:var(--text-muted)}
.topbar-avatar{width:34px;height:34px;border-radius:10px;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
/* ===== 今日やること ===== */
.todo-bar{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:16px;margin-bottom:24px}
.todo-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:14px}
.todo-card.accent{border-color:rgba(232,99,10,0.4)}
.todo-ic{width:42px;height:42px;border-radius:11px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-muted)}
.todo-card.accent .todo-ic{background:var(--orange-pale);color:var(--orange)}
.todo-main{flex:1;min-width:0}
.todo-num{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;line-height:1.05}
.todo-card.accent .todo-num{font-size:32px}
.todo-num.warn{color:var(--orange)}
.todo-lbl{font-size:13px;color:var(--text-muted);margin-top:4px}
.todo-act{font-size:13px;font-weight:700;color:var(--orange);text-decoration:none;white-space:nowrap;flex-shrink:0}
.todo-act:hover{text-decoration:underline}
/* ===== 受注カレンダー ===== */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:18px 20px}
.cal-wd{text-align:center;font-size:12px;font-weight:700;color:var(--text-muted);padding-bottom:2px}
.cal-cell{min-height:52px;border:1px solid var(--border);border-radius:10px;padding:5px 7px;display:flex;flex-direction:column;justify-content:space-between;background:var(--surface)}
.cal-cell.empty{border:none;background:transparent;min-height:0}
.cal-cell.has{background:var(--orange-pale);border-color:rgba(232,99,10,0.25)}
.cal-cell.today{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,99,10,0.18)}
.cal-d{font-size:13px;font-weight:600;color:var(--text)}
.cal-cell.sun .cal-d{color:#dc2626}.cal-cell.sat .cal-d{color:#2563eb}
.cal-badge{align-self:flex-end;background:var(--orange);color:#fff;font-size:11px;font-weight:700;border-radius:9px;padding:1px 7px;font-family:'Space Grotesk',sans-serif}
.cal-legend{display:flex;gap:14px;font-size:12px;color:var(--text-muted);align-items:center}
.cal-legend .dot{display:inline-block;width:9px;height:9px;border-radius:3px;background:var(--orange-pale);border:1px solid rgba(232,99,10,0.3);margin-right:5px;vertical-align:middle}
@media(max-width:880px){.todo-bar{grid-template-columns:1fr}}
/* ===== アイコン（絵文字→統一SVG・線アイコン） ===== */
.nav-item .icon{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px}
.nav-item .icon svg{width:18px;height:18px;stroke-width:1.75}
.logout-item .icon{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px}
.logout-item .icon svg{width:18px;height:18px;stroke-width:1.75}
.todo-ic svg{width:21px;height:21px;stroke-width:1.75}
</style>

<script>
  // ===== ページガード =====
  checkAuth();
  const BADGE      = {'新規受注':'badge-new','処理中':'badge-processing','出荷済み':'badge-shipped'};
  const STATUS_CLS = {'新規受注':'s-new','処理中':'s-processing','出荷済み':'s-shipped'};
  const STATUSES   = ['新規受注','処理中','出荷済み'];
  const userData = JSON.parse(sessionStorage.getItem('user') || '{}');
  const { tenantId, name: userName, role: userRole } = userData;
  (() => {
    const nameEl = document.getElementById('topbarUserName');
    const roleEl = document.getElementById('topbarUserRole');
    const avatarEl = document.getElementById('topbarAvatar');
    if (userName) { nameEl.textContent = userName; roleEl.textContent = userRole === 'admin' ? '管理者' : 'スタッフ'; avatarEl.textContent = userName.charAt(0); }
  })();

  let allOrders = [];
  let tenantPlan = 'starter';

  async function loadTenantPlan() {
    try {
      const res = await fetch(SB_URL + `/rest/v1/tenants?id=eq.${tenantId}&select=plan`, {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getAccessToken() }
      });
      if (res.ok) {
        const data = await res.json();
        tenantPlan = data[0]?.plan || 'starter';
      }
    } catch(e) { console.warn('プラン取得失敗:', e); }
  }

  function isChartLocked() { return tenantPlan === 'starter'; }

  function renderChartLock(containerId) {
    document.getElementById(containerId).innerHTML = `
      <div class="plan-lock">
        <div class="plan-lock-icon">🔒</div>
        <div class="plan-lock-title">スタンダードプランで利用可能</div>
        <div class="plan-lock-sub">グラフ機能は<br>スタンダードプランでご利用いただけます</div>
        <button class="plan-lock-btn" onclick="openUpgradeModal()">アップグレードを見る</button>
      </div>`;
  }

  // openUpgradeModal / closeUpgradeModal は共通モジュール upgrade-modal.js が提供

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadDashboard() {
    await loadTenantPlan();
    const banner = document.getElementById('errorBanner');
    try {
      const res = await fetch(
        SB_URL + `/rest/v1/orders?tenant_id=eq.${tenantId}&select=id,order_code,order_date,status,customers(company_name),order_items(unit_price,quantity,products(product_name))`,
        {
          headers: {
            'apikey': SB_KEY,
            'Authorization': 'Bearer ' + getAccessToken()
          }
        }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      allOrders = data.map(r => {
        const items = Array.isArray(r.order_items) ? r.order_items : [];
        const total = items.reduce((s, i) => s + (i.unit_price * i.quantity), 0);
        return {
          id:       r.order_code || r.id || '',
          uuid:     r.id,
          customer: (r.customers && r.customers.company_name) || '',
          date:     r.order_date || '',
          status:   r.status || '',
          total,
          items:    items.map(i => ({ name: i.products?.product_name || '不明', qty: i.quantity || 0 }))
        };
      });
      banner.style.display = 'none';
      buildMonthOptions();
      renderAll();
    } catch(e) {
      console.error('受注データ取得失敗:', e);
      banner.style.display = 'flex';
    }
  }

  function buildMonthOptions() {
    const now = new Date();
    const months = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      months.push(key);
    }
    const sel = document.getElementById('periodSelect');
    sel.innerHTML = months.map(m => {
      const [y, mo] = m.split('-');
      return `<option value="${m}">${y}年${parseInt(mo)}月</option>`;
    }).join('');
    sel.value = months[months.length - 1];
  }

  function ordersForMonth(key) {
    return allOrders.filter(o => o.date && o.date.startsWith(key));
  }

  function prevMonthKey(key) {
    let [y, m] = key.split('-').map(Number);
    m--; if (m === 0) { m = 12; y--; }
    return `${y}-${String(m).padStart(2,'0')}`;
  }

  function renderAll() {
    const key = document.getElementById('periodSelect').value;
    if (!key) return;
    const [y, mo] = key.split('-');
    document.getElementById('periodLabel').textContent = `${y}年${parseInt(mo)}月 — 月次サマリー`;

    const cur = ordersForMonth(key);
    const sales   = cur.reduce((s,o) => s + o.total, 0);
    const count   = cur.length;
    const avg     = count > 0 ? Math.round(sales / count) : 0;
    const pending = cur.filter(o => o.status === '新規受注').length;

    document.getElementById('kpiSales').textContent  = '¥' + sales.toLocaleString();
    document.getElementById('kpiAvg').textContent    = count > 0 ? '¥' + avg.toLocaleString() : '—';
    document.getElementById('kpiAvgSub').textContent = count > 0 ? `受注${count}件の平均` : '受注なし';
    document.getElementById('kpiOrders').textContent  = count + '件';
    document.getElementById('kpiPending').textContent = pending + '件';
    document.getElementById('kpiPendingSub').textContent = pending > 0 ? '要対応' : '処理待ちなし';

    const prev = ordersForMonth(prevMonthKey(key));
    const prevSales = prev.reduce((s,o) => s + o.total, 0);
    const salesSubEl = document.getElementById('kpiSalesSub');
    if (prevSales > 0) {
      const diff = ((sales - prevSales) / prevSales * 100).toFixed(1);
      salesSubEl.textContent = diff >= 0 ? `前月比 ↑ +${diff}%` : `前月比 ↓ ${diff}%`;
      salesSubEl.className = 'kpi-sub ' + (diff >= 0 ? 'up' : 'down');
    } else {
      salesSubEl.textContent = '—';
      salesSubEl.className = 'kpi-sub';
    }
    const cDiff = count - prev.length;
    const ordersSubEl = document.getElementById('kpiOrdersSub');
    ordersSubEl.textContent = `前月比 ${cDiff >= 0 ? '+' : ''}${cDiff}件`;
    ordersSubEl.className = 'kpi-sub ' + (cDiff > 0 ? 'up' : cDiff < 0 ? 'down' : '');

    renderChart(key);
    renderPieChart(key);
    renderRecentOrders(cur);
    renderTodo();
  }

  function todayStr() {
    const t = new Date();
    return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  }

  // 「今日やること」: 選択月に関係なく“今”を見せる（未処理は全期間・件数は今日/今月）
  function renderTodo() {
    const pending = allOrders.filter(o => o.status === '新規受注').length;
    const ts = todayStr();
    const todayCount = allOrders.filter(o => o.date === ts).length;
    const nowKey = ts.slice(0, 7);
    const monthCount = allOrders.filter(o => o.date && o.date.startsWith(nowKey)).length;
    document.getElementById('todoPending').textContent = pending + '件';
    document.getElementById('todoToday').textContent  = todayCount + '件';
    document.getElementById('todoMonth').textContent  = monthCount + '件';
  }

  // 受注カレンダー: 選択月の各日に受注件数を表示（今日を強調）
  function renderCalendar(key) {
    const [y, m] = key.split('-').map(Number);
    document.getElementById('calTitle').textContent = `受注カレンダー（${y}年${m}月）`;
    const startWd = new Date(y, m - 1, 1).getDay();
    const days = new Date(y, m, 0).getDate();
    const byDay = {};
    ordersForMonth(key).forEach(o => {
      const d = parseInt((o.date || '').slice(8, 10), 10);
      if (d) byDay[d] = (byDay[d] || 0) + 1;
    });
    const ts = todayStr(), isTM = ts.slice(0, 7) === key, td = parseInt(ts.slice(8, 10), 10);
    const wd = ['日','月','火','水','木','金','土'];
    let html = wd.map((w,i) => `<div class="cal-wd"${i===0?' style="color:#dc2626"':i===6?' style="color:#2563eb"':''}>${w}</div>`).join('');
    for (let i = 0; i < startWd; i++) html += '<div class="cal-cell empty"></div>';
    for (let d = 1; d <= days; d++) {
      const wdi = (startWd + d - 1) % 7;
      const cls = ['cal-cell'];
      if (byDay[d]) cls.push('has');
      if (isTM && d === td) cls.push('today');
      if (wdi === 0) cls.push('sun'); else if (wdi === 6) cls.push('sat');
      const badge = byDay[d] ? `<span class="cal-badge">${byDay[d]}</span>` : '<span></span>';
      html += `<div class="${cls.join(' ')}"><span class="cal-d">${d}</span>${badge}</div>`;
    }
    document.getElementById('calendar').innerHTML = html;
  }

  function renderChart(key) {
    if (isChartLocked()) { renderChartLock('chart'); return; }
    const chartMonths = [];
    let [cy, cm] = key.split('-').map(Number);
    for (let i = 5; i >= 0; i--) {
      let m = cm - i, y = cy;
      if (m <= 0) { m += 12; y--; }
      const k = `${y}-${String(m).padStart(2,'0')}`;
      const sales = ordersForMonth(k).reduce((s,o) => s + o.total, 0);
      chartMonths.push({ key: k, label: `${m}月`, sales });
    }
    const max = Math.max(...chartMonths.map(d => d.sales), 1);
    const W = 560, H = 180;
    const padL = 8, padR = 8, padT = 32, padB = 28;
    const plotW = W - padL - padR, plotH = H - padT - padB;
    const n = chartMonths.length;
    const pts = chartMonths.map((d, i) => ({
      x: padL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW),
      y: padT + plotH - (d.sales / max) * plotH,
      ...d
    }));
    const linePath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');
    const areaPath = `${linePath} L${pts[n-1].x},${padT+plotH} L${pts[0].x},${padT+plotH} Z`;
    const nodes = pts.map(p => {
      const isCurrent = p.key === key;
      const amt = p.sales > 0 ? '¥' + (p.sales / 10000).toFixed(1) + '万' : '—';
      return `
        <text x="${p.x}" y="${p.y - 8}" text-anchor="middle" font-size="11" fill="${isCurrent ? '#e8630a' : '#7a6a55'}" font-weight="${isCurrent ? '700' : '400'}" font-family="Space Grotesk,sans-serif">${amt}</text>
        <circle cx="${p.x}" cy="${p.y}" r="${isCurrent ? 5 : 3.5}" fill="${isCurrent ? '#e8630a' : '#fff'}" stroke="${isCurrent ? '#e8630a' : '#e2d9ce'}" stroke-width="2"/>
        <text x="${p.x}" y="${padT + plotH + 18}" text-anchor="middle" font-size="11" fill="${isCurrent ? '#e8630a' : '#7a6a55'}" font-weight="${isCurrent ? '700' : '400'}" font-family="Noto Sans JP,sans-serif">${p.label}</text>
      `;
    }).join('');
    document.getElementById('chart').innerHTML = `
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%;overflow:visible">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#e8630a" stop-opacity="0.12"/>
            <stop offset="100%" stop-color="#e8630a" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="${areaPath}" fill="url(#areaGrad)"/>
        <path d="${linePath}" fill="none" stroke="#e8630a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        ${nodes}
      </svg>`;
  }

  function renderPieChart(key) {
    if (isChartLocked()) { renderChartLock('pieChart'); return; }
    const cur = ordersForMonth(key);
    const counts = {};
    cur.forEach(o => (o.items || []).forEach(it => { counts[it.name] = (counts[it.name] || 0) + it.qty; }));
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 15);
    const el = document.getElementById('pieChart');
    if (sorted.length === 0) {
      el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:14px">データなし</div>';
      return;
    }
    const total = sorted.reduce((s, [, v]) => s + v, 0);
    const COLORS = ['#e8630a','#1e6641','#d97706','#c2410c','#2d9a5f','#92400e','#0891b2','#b45309','#065f46','#7c2d12','#6d28d9','#047857','#9a3412','#be185d','#0369a1'];
    const cx = 90, cy = 90, rO = 78, rI = 48;
    let paths = '', angle = -Math.PI / 2;
    // 1品だけの場合はSVG arcが破綻するので2つのsemicircleで全円を描く
    if (sorted.length === 1) {
      const c = COLORS[0];
      paths = `<path d="M${cx},${cy - rO} A${rO},${rO} 0 1 1 ${cx},${cy + rO} L${cx},${cy + rI} A${rI},${rI} 0 1 0 ${cx},${cy - rI} Z" fill="${c}"/>` +
              `<path d="M${cx},${cy + rO} A${rO},${rO} 0 1 1 ${cx},${cy - rO} L${cx},${cy - rI} A${rI},${rI} 0 1 0 ${cx},${cy + rI} Z" fill="${c}"/>`;
    } else {
      sorted.forEach(([, qty], i) => {
        const sweep = (qty / total) * 2 * Math.PI;
        const x1 = cx + rO * Math.cos(angle), y1 = cy + rO * Math.sin(angle);
        const x2 = cx + rO * Math.cos(angle + sweep), y2 = cy + rO * Math.sin(angle + sweep);
        const xi1 = cx + rI * Math.cos(angle + sweep), yi1 = cy + rI * Math.sin(angle + sweep);
        const xi2 = cx + rI * Math.cos(angle), yi2 = cy + rI * Math.sin(angle);
        const large = sweep > Math.PI ? 1 : 0;
        paths += `<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${rO},${rO} 0 ${large} 1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi1.toFixed(1)},${yi1.toFixed(1)} A${rI},${rI} 0 ${large} 0 ${xi2.toFixed(1)},${yi2.toFixed(1)} Z" fill="${COLORS[i]}" stroke="#fff" stroke-width="1.5"/>`;
        angle += sweep;
      });
    }
    const legend = sorted.map(([name, qty], i) => {
      const short = name.length > 14 ? name.slice(0, 14) + '…' : name;
      return `<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
        <div style="width:9px;height:9px;border-radius:2px;background:${COLORS[i]};flex-shrink:0"></div>
        <span style="font-size:14px;color:var(--text);flex:1;overflow:hidden;white-space:nowrap">${short}</span>
        <span style="font-size:14px;font-family:'Space Grotesk',sans-serif;color:var(--text-muted)">${qty}</span>
      </div>`;
    }).join('');
    el.innerHTML = `<div style="display:flex;align-items:center;gap:12px;height:100%">
      <div style="flex-shrink:0">
        <svg width="180" height="180" viewBox="0 0 180 180">
          ${paths}
          <text x="${cx}" y="${cy - 5}" text-anchor="middle" font-size="11" fill="var(--text-muted)" font-family="Noto Sans JP,sans-serif">合計</text>
          <text x="${cx}" y="${cy + 14}" text-anchor="middle" font-size="20" font-weight="700" fill="var(--text)" font-family="Space Grotesk,sans-serif">${total}</text>
          <text x="${cx}" y="${cy + 28}" text-anchor="middle" font-size="11" fill="var(--text-muted)" font-family="Noto Sans JP,sans-serif">個</text>
        </svg>
      </div>
      <div style="flex:1;overflow-y:auto;max-height:180px">${legend}</div>
    </div>`;
  }

  function renderRecentOrders(orders) {
    const sorted = [...orders].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 5);
    document.getElementById('recentOrders').innerHTML =
      `<thead><tr><th>受注ID</th><th>取引先名</th><th>受注日</th><th>ステータス</th><th style="text-align:right">注文合計</th></tr></thead>
      <tbody>${sorted.length ? sorted.map(o=>`<tr>
        <td style="font-family:'Space Grotesk',sans-serif;color:var(--orange);font-size:14px">${esc(o.id)}</td>
        <td style="font-weight:500">${esc(o.customer)}</td>
        <td style="color:var(--text-muted);font-size:14px">${esc(o.date)}</td>
        <td><select class="status-sel ${STATUS_CLS[o.status]||''}" onchange="patchStatus('${esc(o.uuid)}',this)">${STATUSES.map(s=>`<option value="${s}"${o.status===s?' selected':''}>${s}</option>`).join('')}</select></td>
        <td style="font-weight:700;text-align:right;font-family:'Space Grotesk',sans-serif">¥${o.total.toLocaleString()}</td>
      </tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:20px">この月の受注はありません</td></tr>'}</tbody>`;
  }

  async function patchStatus(orderId, sel) {
    const newStatus = sel.value;
    const prevStatus = sel.dataset.prev || newStatus;
    const prevIdx = STATUSES.indexOf(prevStatus);
    const newIdx = STATUSES.indexOf(newStatus);
    if (prevIdx >= 0 && newIdx >= 0 && newIdx < prevIdx) {
      const ok = confirm(`ステータスを「${prevStatus}」から「${newStatus}」に戻します。よろしいですか？`);
      if (!ok) {
        sel.value = prevStatus;
        return;
      }
    }
    sel.dataset.prev = newStatus;
    sel.className = 'status-sel ' + (STATUS_CLS[newStatus] || '');
    try {
      const res = await fetch(SB_URL + `/rest/v1/orders?id=eq.${orderId}`, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getAccessToken(), 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ status: newStatus })
      });
      if (!res.ok) throw new Error('PATCH failed');
      const order = allOrders.find(o => o.id === orderId);
      if (order) order.status = newStatus;
      sel.classList.add('saved');
      setTimeout(() => sel.classList.remove('saved'), 1000);
    } catch(e) {
      console.error(e);
      sel.value = prevStatus;
      sel.dataset.prev = prevStatus;
      sel.className = 'status-sel ' + (STATUS_CLS[prevStatus] || '');
      alert('ステータスの更新に失敗しました');
    }
  }

  function onPeriodChange() { renderAll(); }

  loadDashboard();
</script>
<script src="mobile.js"></script>
</body>
</html>
